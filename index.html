<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAL Renk Görüntüleyici</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* AÇIK TEMA RENK PALETİ */
  :root {
    --bg: #f8f9fa;
    --surface: #ffffff;
    --surface2: #f1f3f5;
    --border: #dee2e6;
    --text: #212529;
    --muted: #6c757d;
    --accent: #b08d55;
    --accent2: #8f7a5e;
  }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 40px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(248, 249, 250, 0.93); /* Açık tema başlık arka planı */
    backdrop-filter: blur(24px);
    z-index: 100;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 5px;
    color: var(--accent);
  }
  .logo span {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 3px;
    font-family: 'DM Sans';
    display: block;
    margin-top: -3px;
    font-weight: 300;
  }
  .header-right { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }

  .main-grid {
    display: grid;
    grid-template-columns: 340px 1fr;
    height: calc(100vh - 62px);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--surface);
    overflow: hidden;
  }
  .sidebar-top { padding: 18px 18px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .section-label {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 10px; font-weight: 400;
  }
  .search-box {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 13px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }

  /* ── FINISH ── */
  .finish-section { padding: 14px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .finish-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 10px; }
  .finish-btn {
    padding: 9px 8px; border-radius: 7px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--muted); font-family: 'DM Sans';
    font-size: 11px; cursor: pointer; transition: all 0.18s; letter-spacing: 1px;
    text-align: center; text-transform: uppercase;
    display: flex; align-items: center; justify-content: center; gap: 7px;
  }
  .finish-btn:hover { border-color: var(--accent2); color: var(--text); }
  .finish-btn.active { background: var(--accent); border-color: var(--accent); color: #ffffff; font-weight: 500; }
  .fdot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    background: currentColor; display: inline-block;
  }

  /* ── COLOR LIST ── */
  .color-groups { overflow-y: auto; flex: 1; padding: 4px 8px 16px; }
  .color-groups::-webkit-scrollbar { width: 3px; }
  .color-groups::-webkit-scrollbar-track { background: transparent; }
  .color-groups::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .group-title {
    font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--muted); padding: 14px 6px 6px;
  }
  .color-grid { display: grid; grid-template-columns: repeat(6,1fr); gap: 4px; margin-bottom: 2px; }
  .color-chip {
    aspect-ratio: 1; border-radius: 5px; cursor: pointer; position: relative;
    transition: transform 0.12s, box-shadow 0.12s; border: 2px solid transparent;
  }
  .color-chip:hover { transform: scale(1.16); z-index: 1; }
  .color-chip.selected {
    border-color: var(--text); transform: scale(1.2); z-index: 2;
    box-shadow: 0 0 0 3px rgba(0,0,0,0.05), 0 4px 14px rgba(0,0,0,0.2);
  }
  .chip-tooltip {
    position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--border); padding: 5px 10px; border-radius: 5px;
    font-size: 11px; white-space: nowrap; opacity: 0; pointer-events: none;
    transition: opacity 0.12s; color: var(--text); z-index: 20; box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  }
  .color-chip:hover .chip-tooltip { opacity: 1; }

  /* ── RIGHT PANEL ── */
  .preview-area { display: flex; flex-direction: column; overflow: hidden; }
  .preview-header {
    padding: 22px 36px 18px; border-bottom: 1px solid var(--border); background: var(--surface);
    display: flex; align-items: flex-end; justify-content: space-between; flex-shrink: 0;
  }
  .ral-code-big {
    font-family: 'Bebas Neue', sans-serif; font-size: 54px; line-height: 1; transition: color 0.35s;
  }
  .color-name-line { font-size: 13px; color: var(--muted); margin-top: 2px; font-style: italic; font-weight: 300; }
  .hex-block { text-align: right; }
  .hex-val { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; color: var(--text); }
  .hex-label { font-size: 10px; letter-spacing: 2px; color: var(--muted); margin-top: 2px; text-transform: uppercase; }
  .finish-badge { font-size: 10px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; margin-top: 6px; }

  /* ── PREVIEWS ── */
  .previews { display: grid; grid-template-columns: 1fr 1fr; flex: 1; overflow: hidden; }
  .flat-preview { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .preview-label {
    padding: 12px 24px; font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--muted); border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--surface);
  }
  .flat-surface-wrap {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: #e9ecef; padding: 28px; /* Açık arka plan */
  }
  .flat-surface {
    width: 250px; height: 186px; border-radius: 14px; position: relative;
    overflow: hidden; transition: background-color 0.35s;
  }
  .flat-surface::after {
    content: ''; position: absolute; inset: 0; border-radius: 14px;
    pointer-events: none; transition: opacity 0.35s;
  }
  /* Glossy */
  .flat-surface.f-glossy {
    box-shadow: 0 24px 64px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.42), inset 0 -1px 0 rgba(0,0,0,0.15);
  }
  .flat-surface.f-glossy::after {
    background: linear-gradient(145deg, rgba(255,255,255,0.40) 0%, rgba(255,255,255,0.0) 52%);
  }
  /* Semi-glossy */
  .flat-surface.f-semi-glossy {
    box-shadow: 0 16px 48px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.22);
  }
  .flat-surface.f-semi-glossy::after {
    background: linear-gradient(145deg, rgba(255,255,255,0.20) 0%, rgba(255,255,255,0.0) 58%);
  }
  /* Semi-matte */
  .flat-surface.f-semi-matte {
    box-shadow: 0 10px 36px rgba(0,0,0,0.15);
  }
  .flat-surface.f-semi-matte::after {
    background: linear-gradient(145deg, rgba(255,255,255,0.10) 0%, transparent 48%);
  }
  /* Matte */
  .flat-surface.f-matte {
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    filter: brightness(0.97);
  }
  .flat-surface.f-matte::after { background: none; }

  /* ── CANVAS ── */
  .canvas-preview { display: flex; flex-direction: column; overflow: hidden; }
  .canvas-wrap {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: #e9ecef; position: relative; /* Açık arka plan */
  }
  canvas#ralCanvas { display: block; cursor: grab; }
  canvas#ralCanvas:active { cursor: grabbing; }
  .drag-hint {
    position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
    font-size: 10px; letter-spacing: 2px; color: var(--muted);
    white-space: nowrap; pointer-events: none;
  }
</style>
</head>
<body>

<header>
  <div class="logo">RAL VIEWER <span>Renk & Yüzey Görüntüleyici</span></div>
  <div class="header-right">360° Canlı Önizleme</div>
</header>

<div class="main-grid">

  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="section-label">Renk Ara</div>
      <input class="search-box" id="searchInput" type="text" placeholder="RAL kodu veya isim...">
    </div>

    <div class="finish-section">
      <div class="section-label">Yüzey Tipi</div>
      <div class="finish-grid">
        <button class="finish-btn active" id="btn-glossy"      onclick="setFinish('glossy')">
          <span class="fdot" style="background:rgba(255,255,255,0.95);box-shadow:0 0 5px rgba(0,0,0,0.3)"></span>Parlak
        </button>
        <button class="finish-btn" id="btn-semi-glossy" onclick="setFinish('semi-glossy')">
          <span class="fdot" style="background:rgba(255,255,255,0.55)"></span>Yarı-Parlak
        </button>
        <button class="finish-btn" id="btn-semi-matte"  onclick="setFinish('semi-matte')">
          <span class="fdot" style="background:rgba(255,255,255,0.22)"></span>Yarı-Mat
        </button>
        <button class="finish-btn" id="btn-matte"       onclick="setFinish('matte')">
          <span class="fdot" style="background:transparent;border:1px solid rgba(0,0,0,0.3)"></span>Mat
        </button>
      </div>
    </div>

    <div class="color-groups" id="colorGroups"></div>
  </aside>

  <main class="preview-area">
    <div class="preview-header">
      <div>
        <div class="ral-code-big" id="bigCode">RAL 2004</div>
        <div class="color-name-line" id="bigName">Pure Orange / Saf Turuncu</div>
      </div>
      <div class="hex-block">
        <div class="hex-val" id="hexVal">#D45F3C</div>
        <div class="hex-label">HEX KODU</div>
        <div class="finish-badge" id="finishBadge">✦ Parlak</div>
      </div>
    </div>

    <div class="previews">
      <div class="flat-preview">
        <div class="preview-label">▣ &nbsp;Düz Yüzey</div>
        <div class="flat-surface-wrap">
          <div class="flat-surface f-glossy" id="flatSurface"></div>
        </div>
      </div>

      <div class="canvas-preview">
        <div class="preview-label">◎ &nbsp;360° Küre Önizleme</div>
        <div class="canvas-wrap">
          <canvas id="ralCanvas" width="460" height="400"></canvas>
          <div class="drag-hint">⟳ &nbsp;Sürükleyerek döndür</div>
        </div>
      </div>
    </div>
  </main>

</div>

  "RAL 9017":{ name:"Traffic black",     hex:"#1E1E1E" },

const groups = {
  "1000 – Sarı":       Object.keys(ralColors).filter(k=>k.startsWith("RAL 1")),
  "2000 – Turuncu":    Object.keys(ralColors).filter(k=>k.startsWith("RAL 2")),
  "3000 – Kırmızı":   Object.keys(ralColors).filter(k=>k.startsWith("RAL 3")),
  "4000 – Mor":        Object.keys(ralColors).filter(k=>k.startsWith("RAL 4")),
  "5000 – Mavi":       Object.keys(ralColors).filter(k=>k.startsWith("RAL 5")),
  "6000 – Yeşil":      Object.keys(ralColors).filter(k=>k.startsWith("RAL 6")),
  "7000 – Gri":        Object.keys(ralColors).filter(k=>k.startsWith("RAL 7")),
  "8000 – Kahverengi": Object.keys(ralColors).filter(k=>k.startsWith("RAL 8")),
  "9000 – Nötr":       Object.keys(ralColors).filter(k=>k.startsWith("RAL 9")),
};

// ══════════════════════════════════════
//  STATE
// ══════════════════════════════════════
let currentRal   = "RAL 2004";
let currentColor = "#D45F3C";
let finish       = "glossy";

const finishLabels = {
  "glossy":      "✦ Parlak",
  "semi-glossy": "◈ Yarı-Parlak",
  "semi-matte":  "◇ Yarı-Mat",
  "matte":       "○ Mat",
};

// Phong parameters per finish
const FINISH_PARAMS = {
  "glossy":      { specPow: 100, specInt: 1.00, ambient: 0.14, diffuse: 0.86 },
  "semi-glossy": { specPow: 28,  specInt: 0.48, ambient: 0.20, diffuse: 0.80 },
  "semi-matte":  { specPow: 7,   specInt: 0.14, ambient: 0.26, diffuse: 0.70 },
  "matte":       { specPow: 0,   specInt: 0.00, ambient: 0.32, diffuse: 0.62 },
};

// ══════════════════════════════════════
//  SIDEBAR
// ══════════════════════════════════════
function buildColorGroups(filter='') {
  const container = document.getElementById('colorGroups');
  container.innerHTML = '';
  const q = filter.trim().toLowerCase();

  for (const [gName, keys] of Object.entries(groups)) {
    const visible = keys.filter(k =>
      !q || k.toLowerCase().includes(q) || ralColors[k].name.toLowerCase().includes(q)
    );
    if (!visible.length) continue;

    const title = document.createElement('div');
    title.className = 'group-title';
    title.textContent = gName;
    container.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'color-grid';

    visible.forEach(ral => {
      const chip = document.createElement('div');
      chip.className = 'color-chip' + (ral === currentRal ? ' selected' : '');
      chip.style.background = ralColors[ral].hex;
      chip.dataset.ral = ral;

      const tip = document.createElement('div');
      tip.className = 'chip-tooltip';
      tip.textContent = `${ral} · ${ralColors[ral].name}`;
      chip.appendChild(tip);

      chip.addEventListener('click', () => selectColor(ral));
      grid.appendChild(chip);
    });

    container.appendChild(grid);
  }
}

// ══════════════════════════════════════
//  SELECT COLOR → updates both panels
// ══════════════════════════════════════
function selectColor(ral) {
  currentRal   = ral;
  currentColor = ralColors[ral].hex;

  document.getElementById('bigCode').textContent = ral;
  document.getElementById('bigCode').style.color  = currentColor;
  document.getElementById('bigName').textContent  = ralColors[ral].name;
  document.getElementById('hexVal').textContent   = ralColors[ral].hex.toUpperCase();

  document.querySelectorAll('.color-chip').forEach(c => {
    c.classList.toggle('selected', c.dataset.ral === ral);
  });

  applyFlatSurface();
  drawSphere();
}

// ══════════════════════════════════════
//  FLAT SURFACE
// ══════════════════════════════════════
function applyFlatSurface() {
  const flat = document.getElementById('flatSurface');
  flat.style.backgroundColor = currentColor;
  flat.className = 'flat-surface f-' + finish;
}

// ══════════════════════════════════════
//  SET FINISH
// ══════════════════════════════════════
function setFinish(f) {
  finish = f;
  ['glossy','semi-glossy','semi-matte','matte'].forEach(id => {
    document.getElementById('btn-'+id).classList.toggle('active', id === f);
  });
  document.getElementById('finishBadge').textContent = finishLabels[f];
  applyFlatSurface();
  drawSphere();
}

document.getElementById('searchInput').addEventListener('input', e => {
  buildColorGroups(e.target.value);
});

// ══════════════════════════════════════
//  SPHERE RENDERER — clean Blinn-Phong
// ══════════════════════════════════════
const canvas = document.getElementById('ralCanvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const SPH_R = 158;
const SCX = W/2, SCY = H/2;

// Fixed key light in view space
const LX = 0.50, LY = -0.65, LZ = 0.57;
const lm = Math.sqrt(LX*LX+LY*LY+LZ*LZ);
const LIGHT = { x:LX/lm, y:LY/lm, z:LZ/lm };

// Secondary fill light (soft, opposite side)
const FX = -0.30, FY = 0.20, FZ = 0.50;
const fm = Math.sqrt(FX*FX+FY*FY+FZ*FZ);
const FILL  = { x:FX/fm, y:FY/fm, z:FZ/fm };

function hexToRgb(h) {
  return { r:parseInt(h.slice(1,3),16), g:parseInt(h.slice(3,5),16), b:parseInt(h.slice(5,7),16) };
}

const imgData = ctx.createImageData(W, H);

function drawSphere() {
  const rgb = hexToRgb(currentColor);
  const fp  = FINISH_PARAMS[finish];
  const data = imgData.data;

  for (let py=0; py<H; py++) {
    for (let px=0; px<W; px++) {
      const idx = (py*W + px)*4;
      const dx = px - SCX, dy = py - SCY;
      const d2 = dx*dx + dy*dy;

      if (d2 >= SPH_R*SPH_R) {
        data[idx+3] = 0;
        continue;
      }

      // View-space normal — perfectly smooth sphere
      const dz = Math.sqrt(SPH_R*SPH_R - d2);
      const nx = dx/SPH_R, ny = dy/SPH_R, nz = dz/SPH_R;

      // Key light diffuse
      const diffKey  = Math.max(0, nx*LIGHT.x + ny*LIGHT.y + nz*LIGHT.z);
      // Fill light (dimmer)
      const diffFill = Math.max(0, nx*FILL.x  + ny*FILL.y  + nz*FILL.z) * 0.20;

      // Total diffuse
      const diff = diffKey * fp.diffuse + diffFill;

      // Blinn-Phong specular (key light only)
      let spec = 0;
      if (fp.specInt > 0 && diffKey > 0) {
        // halfway vector between key light and view direction (0,0,1)
        const hx = LIGHT.x, hy = LIGHT.y, hz = LIGHT.z + 1.0;
        const hl = Math.sqrt(hx*hx+hy*hy+hz*hz);
        const nh = nx*(hx/hl) + ny*(hy/hl) + nz*(hz/hl);
        spec = Math.pow(Math.max(0, nh), fp.specPow) * fp.specInt;
      }

      // Rim / edge darkening (makes it look more spherical)
      const rim = 1.0 - Math.pow(1.0 - nz, 2.2) * 0.55;

      const bright = (fp.ambient + diff) * rim;

      let r = rgb.r * bright + spec * 255;
      let g = rgb.g * bright + spec * 255;
      let b = rgb.b * bright + spec * 255;

      data[idx]   = Math.min(255, Math.round(r));
      data[idx+1] = Math.min(255, Math.round(g));
      data[idx+2] = Math.min(255, Math.round(b));
      data[idx+3] = 255;
    }
  }

  ctx.clearRect(0,0,W,H);
  ctx.putImageData(imgData, 0, 0);

  // Ground shadow (Açık tema için biraz yumuşatıldı)
  ctx.save();
  const sy = SCY + SPH_R + 14;
  const sg = ctx.createRadialGradient(SCX, sy, 4, SCX, sy, SPH_R*0.6);
  sg.addColorStop(0,'rgba(0,0,0,0.15)');
  sg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.scale(1, 0.25);
  ctx.beginPath();
  ctx.arc(SCX, sy/0.25, SPH_R*0.6, 0, Math.PI*2);
  ctx.fillStyle = sg;
  ctx.fill();
  ctx.restore();
}

// ── Rotation & drag ──
let rotX=0, rotY=0; 
let isDragging=false, lastMX=0, lastMY=0;
let autoSpin=true;
let lightOffsetY = 0;

canvas.addEventListener('mousedown', e => {
  isDragging = true; autoSpin = false;
  lastMX = e.clientX; lastMY = e.clientY;
  canvas.style.cursor = 'grabbing';
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  lightOffsetY += (e.clientX - lastMX) * 0.015;
  lastMX = e.clientX; lastMY = e.clientY;
  applyLightOffset();
  drawSphere();
});
window.addEventListener('mouseup', () => { isDragging = false; canvas.style.cursor='grab'; });

canvas.addEventListener('touchstart', e=>{
  isDragging=true; autoSpin=false;
  lastMX=e.touches[0].clientX; lastMY=e.touches[0].clientY;
},{passive:true});
canvas.addEventListener('touchmove', e=>{
  if(!isDragging)return; e.preventDefault();
  lightOffsetY += (e.touches[0].clientX - lastMX)*0.015;
  lastMX=e.touches[0].clientX; lastMY=e.touches[0].clientY;
  applyLightOffset(); drawSphere();
},{passive:false});
canvas.addEventListener('touchend',()=>{ isDragging=false; });

function applyLightOffset() {
  const c = Math.cos(lightOffsetY), s = Math.sin(lightOffsetY);
  const ox = LX/lm, oz = LZ/lm;
  LIGHT.x =  ox*c + oz*s;
  LIGHT.z = -ox*s + oz*c;
}

function loop() {
  if (autoSpin) {
    lightOffsetY += 0.006;
    applyLightOffset();
    drawSphere();
  }
  requestAnimationFrame(loop);
}

// ── INIT ──
buildColorGroups();
selectColor('RAL 2004');
loop();
</script>
